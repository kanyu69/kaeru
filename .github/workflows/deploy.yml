name: Web Build + Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
concurrency:
  group: "pages"
  cancel-in-progress: false
env:
  UV_PYTHON: "3.12"
  FLET_CLI_NO_RICH_OUTPUT: 1
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup venv and install flet
        run: |
          uv venv
          uv pip install flet

      - name: Show flet build help
        run: uv run flet build web --help


      - name: Build app
        run: |
          uv run flet build web --module-name flet_main --yes --verbose --base-url kaeru --route-url-strategy hash web_app
          echo "=== build/web の中身 ==="
          ls -la web_app/build/web/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
          name: web-build-artifact
          
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: web_app/build/web
          name: web-build-artifact
