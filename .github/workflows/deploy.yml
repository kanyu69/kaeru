name: Deploy Kivy Web App

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dist Package
        run: |
          # 1. 公開用のdistフォルダを作成
          mkdir -p ./dist
          
          # 2. 必要なファイルをすべてdistフォルダに直接集める
          cp main.py ./dist/
          cp main.kv ./dist/
          cp index.html ./dist/
          cp web_bridge.js ./dist/ || true
          
          # 3. フォントフォルダがあれば丸ごとコピー
          if [ -d "fonts" ]; then
            cp -r fonts ./dist/
          fi
          
          echo "Files inside dist:"
          ls -la ./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
