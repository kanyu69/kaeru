name: Deploy Flet Web App

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dist Package
        run: |
          # 1. 公開用のdistフォルダを作成
          mkdir -p ./dist
          
          # 2. Fletアプリに必要なファイルをすべてdistフォルダに直接集める
          cp index.html ./dist/
          cp flet.js ./dist/
          cp flet_main.py ./dist/
          
          # 3. 画像やアイコンフォルダ（data）があれば丸ごとコピー
          if [ -d "data" ]; then
            cp -r data ./dist/
          fi

          # 4. フォントフォルダ（fonts）があれば丸ごとコピー
          if [ -d "fonts" ]; then
            cp -r fonts ./dist/
          fi
          
          echo "=== 配信フォルダ（dist）の中身を確認 ==="
          ls -la ./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
