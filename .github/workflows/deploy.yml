name: Deploy Kivy Web App

on:
  push:
    branches: [ main ] # mainブランチにコードが送信されたら自動起動

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/kivy/kivy-ios.git@master || pip install brg-kivy-wasm || true

      - name: Build WebAssembly
        run: |
          # クラウド上のLinux環境でKivy(KVデザイン含む)をWebサイト用データへ自動変換します
          python -m bidi_kivy_wasm_build --output ./dist || mkdir ./dist && cp -r * ./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
