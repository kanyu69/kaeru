name: Deploy Kivy Web App

on:
  push:
    branches: [ main ] # mainブランチにコードが送信されたら自動起動

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # WebAssemblyビルドに必要なツール類をインストール
          pip install git+https://github.com/kivy/kivy-ios.git@master || true
          pip install brg-kivy-wasm || true
          # もし特定のパッケージが必要な場合は、ここに「pip install パッケージ名」を追加してください

      - name: Build WebAssembly
        run: |
          # クラウド上のLinux環境でKivyをWeb用データへ自動変換を試みる
          if python -m bidi_kivy_wasm_build --output ./dist; then
            echo "bidi_kivy_wasm_build succeeded."
          else
            echo "bidi_kivy_wasm_build failed. Falling back to manual copy..."
            # distディレクトリをあらかじめ作成
            mkdir -p ./dist
            
            # dist自身や、隠しファイル(.gitなど)を除外して安全にコピー
            rsync -rr --exclude='dist' --exclude='.git' --exclude='.github' ./ ./dist/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
