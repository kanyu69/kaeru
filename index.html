<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaeru App</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flet/0.22.1/flet.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #262626; overflow: hidden;
            color: white; font-family: sans-serif;
        }
        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #262626; display: flex; justify-content: center;
            align-items: center; flex-direction: column; z-index: 999;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px;
            border-radius: 50%; border-left-color: #339966;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #flet-app-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Kaeru アプリを起動中...</div>
    </div>

    <div id="flet-app-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // flet_main.py をWeb用UIとして直接マウントして起動します
            flet.createApp("flet-app-container", {
                pythonScript: "flet_main.py"
            }).then(() => {
                // 起動が成功したらローディング画面を消す
                document.getElementById('loading').style.display = 'none';
            }).catch((err) => {
                document.getElementById('loading-text').innerHTML = 
                    `<span style="color:#ff6666;">起動エラーが発生しました</span><br><small>${err.message}</small>`;
                console.error(err);
            });
        });
    </script>
</body>
</html>
