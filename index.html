<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boycott App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flet/0.21.2/flet.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #262626; overflow: hidden;
        }
        #flet-app-container {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

    <div id="flet-app-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // flet_main.py をブラウザ上でロードして実行する命令
            flet.createApp("flet-app-container", {
                pythonScript: "flet_main.py"
            });
        });
    </script>
</body>
</html>
