<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaeru App</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
        }
        /* Kivyアプリが描画されるメインキャンバス */
        #canvas {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 10;
        }
        /* 起動中のローディング画面 */
        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: white;
            display: flex; justify-content: center; align-items: center;
            z-index: 999; font-size: 1.2rem; font-family: sans-serif;
            text-align: center;
        }
        /* カメラ表示用の背面コンテナ */
        #camera-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; display: none;
        }
        #camera-video {
            width: 100%; height: 100%; object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="loading">Kivyアプリを起動中...</div>
    
    <div id="camera-container">
        <video id="camera-video" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script src="web_bridge.js"></script>

    <script>
        function makeKivyTransparent() {
            const canvas = document.getElementById('canvas');
            if (canvas) canvas.style.opacity = "0.5";
        }

        async function main() {
            const loadingText = document.getElementById('loading');

            try {
                // 1. Python環境（Pyodide）を初期化
                let pyodide = await loadPyodide();
                
                // 2. パッケージマネージャを準備
                await pyodide.loadPackage(["micropip"]);
                const micropip = pyodide.pyimport("micropip");
                
                // 3. 必要な外部ライブラリ（requestsなど）のインストール
                // 【重要】ここで"kivy"はインストールしてはいけません（エラーになります）
                loadingText.innerText = "依存ライブラリを読込中...";
                await micropip.install("requests"); 

                loadingText.innerText = "ファイルを展開中...";

                // 4. サーバー上のPythonファイルとKVファイルをPyodideの仮想環境内にロード
                const filesToLoad = ['main.py', 'main.kv'];
                for (const file of filesToLoad) {
                    const response = await fetch(file + '?t=' + new Date().getTime()); // キャッシュ対策
                    if (!response.ok) throw new Error(`${file} がサーバー上に見つかりません`);
                    const content = await response.text();
                    pyodide.FS.writeFile(file, content);
                }

                // フォント用ディレクトリを擬似的に作成
                try {
                    pyodide.FS.mkdir('fonts');
                    const fontRes = await fetch('fonts/UDEVGothicHS-Regular.ttf');
                    if (fontRes.ok) {
                        const fontData = await fontRes.arrayBuffer();
                        pyodide.FS.writeFile('fonts/UDEVGothicHS-Regular.ttf', new Uint8Array(fontData));
                    }
                } catch (e) {
                    console.log("Font setup skipped:", e);
                }

                loadingText.innerText = "アプリを起動しています...";

                // 5. アプリ（main.py）を実行
                const mainCode = pyodide.FS.readFile('main.py', { encoding: 'utf8' });
                await pyodide.runPythonAsync(mainCode);

                // 起動できたらローディングを消す
                loadingText.style.display = 'none';

            } catch (err) {
                console.error(err);
                loadingText.innerText = "起動エラーが発生しました:\n" + err.message;
            }
        }

        main();
    </script>
</body>
</html>
