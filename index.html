<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaeru App</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
        }
        /* Kivyの出力先：公式仕様に合わせた配置 */
        #canvas {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 10;
        }
        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: white;
            display: flex; justify-content: center; align-items: center;
            z-index: 999; font-size: 1.2rem; font-family: sans-serif;
            text-align: center; line-height: 1.6;
            white-space: pre-wrap; /* 改行を表示するために追加 */
        }
        #camera-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; display: none;
        }
        #camera-video {
            width: 100%; height: 100%; object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="loading">Kivyグラフィックスを初期化中...</div>
    
    <div id="camera-container">
        <video id="camera-video" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script src="web_bridge.js"></script>

    <script>
        function makeKivyTransparent() {
            const canvas = document.getElementById('canvas');
            if (canvas) canvas.style.opacity = "0.5";
        }

        async function main() {
            const loadingText = document.getElementById('loading');

            try {
                // 1. Python環境の起動
                let pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
                });
                
                // 2. Kivyのグラフィックス（Window）がブラウザのCanvasを見つけられるようにグローバル登録
                window.canvas = document.getElementById('canvas');
                
                // 【重要】Kivyが内部で要求するブラウザの描画オブジェクト（Module）を擬似的に定義
                window.Module = {
                    canvas: window.canvas,
                    print: console.log,
                    printErr: console.error
                };

                // 3. パッケージマネージャの準備
                await pyodide.loadPackage(["micropip"]);
                const micropip = pyodide.pyimport("micropip");
                
                // 4. 依存ライブラリのインストール
                loadingText.innerText = "依存ライブラリをロード中...";
                await micropip.install("requests"); 

                // 5. Kivyエンジンのインポート
                loadingText.innerText = "Kivyグラフィックスエンジンを同期中...";
                await micropip.install("https://pyodide-packages.kivy.org/kivy-2.3.0-cp311-cp311-emscripten_3_1_45_wasm32.whl");

                // 6. 仮想ウィンドウ環境（ダミーのAndroid/iOS/Webウインドウマネージャ）をPython側に認識させる
                pyodide.runPython(`
import os
# KivyにWeb環境（X11やAndroid環境がない状態）であることを教える
os.environ['KIVY_WINDOW'] = 'sdl2'
os.environ['KIVY_GL_BACKEND'] = 'gl'
`);

                loadingText.innerText = "アプリケーションファイルを展開中...";

                // 7. サーバー上のメインファイル（テキスト系）を同期
                const filesToLoad = ['main.py', 'main.kv'];
                for (const file of filesToLoad) {
                    const response = await fetch(file + '?t=' + new Date().getTime());
                    if (!response.ok) throw new Error(`${file} が見つかりません`);
                    const content = await response.text();
                    pyodide.FS.writeFile(file, content);
                }

                // 8. 画像アセット（バイナリファイル）を同期
                // リポジトリにあるロゴ画像などを登録します
                const binaryFiles = [
                    'logo_color_full.png',
                    'trash_wh.png',
                    'back_wh.png',
                    'home.png',
                    'list.png',
                    'scan.png',
                    'history.png',
                    'set.png',
                    'icon.png',
                    'back.png',
                    'image_br.png',
                    'light_br.png',
                    'mail_wh.png',
                    'top.png',  
                    'lemon.png',   
                    'orange.png',    
                    'zakuro.png',
                    'back_br.png'
                ];
                
                for (const file of binaryFiles) {
                    try {
                        const res = await fetch(file + '?t=' + new Date().getTime());
                        if (res.ok) {
                            const data = await res.arrayBuffer();
                            pyodide.FS.writeFile(file, new Uint8Array(data));
                            console.log(`Loaded image asset: ${file}`);
                        } else {
                            console.warn(`Asset missing or error: ${file}`);
                        }
                    } catch (e) {
                        console.error(`Failed to load asset: ${file}`, e);
                    }
                }

                // 9. フォントの設置
                try {
                    // ディレクトリを作成（エラーを避けるため存在チェックかtry-catch）
                    try {
                        pyodide.FS.mkdir('fonts');
                    } catch(e) {}

                    const fontRes = await fetch('fonts/UDEVGothicHS-Regular.ttf?t=' + new Date().getTime());
                    if (fontRes.ok) {
                        const fontData = await fontRes.arrayBuffer();
                        pyodide.FS.writeFile('fonts/UDEVGothicHS-Regular.ttf', new Uint8Array(fontData));
                        console.log("Font loaded successfully.");
                    } else {
                        console.warn("Font file not found on server.");
                    }
                } catch (e) {
                    console.error("Font setup error:", e);
                }

                loadingText.innerText = "画面をレンダリングしています...";

                // 10. アプリ（main.py）を実行
                const mainCode = pyodide.FS.readFile('main.py', { encoding: 'utf8' });
                await pyodide.runPythonAsync(mainCode);

                // 起動完了したら非表示
                loadingText.style.display = 'none';

            } catch (err) {
                console.error(err);
                // Python側の詳細なスタックトレースをJavaScript側でも読めるように出力
                let errorMsg = err.message;
                if (err.stack) {
                    console.error(err.stack);
                }
                loadingText.innerText = "起動エラーが発生しました:\n" + errorMsg;
            }
        }

        main();
    </script>
</body>
</html>
